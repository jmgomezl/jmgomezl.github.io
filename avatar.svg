<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0a0a0a"/>

  <!-- Head shape (bald) -->
  <rect x="10" y="4" width="12" height="1" fill="#c8956c"/>
  <rect x="9" y="5" width="14" height="1" fill="#c8956c"/>
  <rect x="8" y="6" width="16" height="1" fill="#c8956c"/>
  <rect x="8" y="7" width="16" height="1" fill="#c8956c"/>
  <rect x="8" y="8" width="16" height="1" fill="#c8956c"/>
  <rect x="8" y="9" width="16" height="1" fill="#c8956c"/>
  <rect x="8" y="10" width="16" height="1" fill="#c8956c"/>

  <!-- Eyes -->
  <rect x="11" y="8" width="2" height="1" fill="#1a1a1a"/>
  <rect x="19" y="8" width="2" height="1" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <rect x="11" y="8" width="1" height="1" fill="#333"/>
  <rect x="19" y="8" width="1" height="1" fill="#333"/>

  <!-- Eyebrows -->
  <rect x="10" y="7" width="4" height="1" fill="#2a1a0a"/>
  <rect x="18" y="7" width="4" height="1" fill="#2a1a0a"/>

  <!-- Nose -->
  <rect x="15" y="9" width="2" height="2" fill="#b8855c"/>

  <!-- Smile -->
  <rect x="12" y="12" width="1" height="1" fill="#fff"/>
  <rect x="13" y="12" width="6" height="1" fill="#fff"/>
  <rect x="19" y="12" width="1" height="1" fill="#fff"/>

  <!-- Beard (full, dark) -->
  <rect x="8" y="11" width="2" height="1" fill="#1a0f05"/>
  <rect x="22" y="11" width="2" height="1" fill="#1a0f05"/>
  <rect x="8" y="12" width="4" height="1" fill="#1a0f05"/>
  <rect x="20" y="12" width="4" height="1" fill="#1a0f05"/>
  <rect x="8" y="13" width="16" height="1" fill="#1a0f05"/>
  <rect x="9" y="14" width="14" height="1" fill="#1a0f05"/>
  <rect x="10" y="15" width="12" height="1" fill="#1a0f05"/>
  <rect x="11" y="16" width="10" height="1" fill="#1a0f05"/>
  <rect x="12" y="17" width="8" height="1" fill="#1a0f05"/>

  <!-- Mustache -->
  <rect x="10" y="11" width="5" height="1" fill="#1a0f05"/>
  <rect x="17" y="11" width="5" height="1" fill="#1a0f05"/>

  <!-- Ears -->
  <rect x="7" y="8" width="1" height="3" fill="#c8956c"/>
  <rect x="24" y="8" width="1" height="3" fill="#c8956c"/>

  <!-- Neck -->
  <rect x="13" y="18" width="6" height="1" fill="#c8956c"/>

  <!-- T-shirt (white, like Vans tee) -->
  <rect x="6" y="19" width="20" height="1" fill="#e8e8e8"/>
  <rect x="5" y="20" width="22" height="1" fill="#e8e8e8"/>
  <rect x="4" y="21" width="24" height="1" fill="#e8e8e8"/>
  <rect x="4" y="22" width="24" height="1" fill="#e8e8e8"/>
  <rect x="4" y="23" width="24" height="1" fill="#e8e8e8"/>
  <rect x="4" y="24" width="24" height="1" fill="#e8e8e8"/>
  <rect x="5" y="25" width="22" height="1" fill="#e8e8e8"/>
  <rect x="5" y="26" width="22" height="1" fill="#e8e8e8"/>
  <rect x="5" y="27" width="22" height="1" fill="#e8e8e8"/>
  <rect x="5" y="28" width="22" height="1" fill="#e8e8e8"/>
  <rect x="5" y="29" width="22" height="1" fill="#e8e8e8"/>
  <rect x="5" y="30" width="22" height="1" fill="#e8e8e8"/>
  <rect x="5" y="31" width="22" height="1" fill="#e8e8e8"/>

  <!-- Arms crossed hint -->
  <rect x="4" y="24" width="3" height="4" fill="#c8956c"/>
  <rect x="25" y="24" width="3" height="4" fill="#c8956c"/>
  <rect x="7" y="26" width="5" height="2" fill="#c8956c"/>
  <rect x="20" y="26" width="5" height="2" fill="#c8956c"/>

  <!-- Shirt text "V" hint -->
  <rect x="13" y="22" width="1" height="2" fill="#333"/>
  <rect x="14" y="23" width="1" height="1" fill="#333"/>
  <rect x="15" y="24" width="1" height="1" fill="#333"/>
  <rect x="16" y="23" width="1" height="1" fill="#333"/>
  <rect x="17" y="22" width="1" height="2" fill="#333"/>

  <!-- Cypherpunk touch: green pixel sunglasses -->
  <rect x="10" y="8" width="5" height="2" fill="#00ff88" opacity="0.3"/>
  <rect x="17" y="8" width="5" height="2" fill="#00ff88" opacity="0.3"/>
  <rect x="15" y="8" width="2" height="1" fill="#00ff88" opacity="0.3"/>

  <!-- Matrix scanline effect -->
  <rect x="0" y="2" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="6" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="10" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="14" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="18" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="22" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="26" width="32" height="1" fill="#00ff88" opacity="0.03"/>
  <rect x="0" y="30" width="32" height="1" fill="#00ff88" opacity="0.03"/>
</svg>
